<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>ChampomyFM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--gold:#c9a84c;--gold-light:#f0d080;--dark:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--text:#f0ece0;--muted:#7a7060;--success:#5ec47a;--danger:#e05a5a;--info:#5ab4e0;--radius:12px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Mono',monospace;background:var(--dark);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}
    .container{position:relative;z-index:1;width:100%;max-width:440px}
    header{text-align:center;margin-bottom:36px}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;background:linear-gradient(135deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
    .tagline{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:4px}
    #setup{background:var(--surface);border:1px solid #2a2a2a;border-radius:var(--radius);padding:32px;animation:fadeIn .4s ease}
    .setup-label{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:16px}
    .input-row{display:flex;gap:12px;margin-bottom:24px}
    .input-wrap{flex:1;position:relative}
    .input-wrap label{display:block;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
    .input-wrap input{width:100%;background:var(--surface2);border:1px solid #2e2e2e;border-radius:8px;padding:12px 14px 12px 28px;font-family:'DM Mono',monospace;font-size:16px;color:var(--text);outline:none;transition:border-color .2s}
    .input-wrap input:focus{border-color:var(--gold)}
    .currency-symbol{position:absolute;left:10px;bottom:13px;color:var(--gold);font-size:14px}
    .btn-start{width:100%;background:linear-gradient(135deg,var(--gold),#a07830);border:none;border-radius:8px;padding:16px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--dark);cursor:pointer;transition:opacity .2s,transform .1s}
    .btn-start:hover{opacity:.9}.btn-start:active{transform:scale(.98)}
    #game{display:none;animation:fadeIn .4s ease}
    .timer-bar-wrap{height:4px;background:#2a2a2a;border-radius:2px;margin-bottom:24px;overflow:hidden}
    .timer-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:2px;width:100%;transition:width 1s linear,background .5s}
    .timer-bar.urgent{background:linear-gradient(90deg,var(--danger),#ff9090)}
    .hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:12px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
    .hud-timer{color:var(--text);font-size:14px}
    .price-card{background:var(--surface);border:1px solid #252525;border-radius:var(--radius);padding:28px 24px;text-align:center;margin-bottom:16px;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .phase-label{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
    #result{font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:2px;color:var(--gold-light);line-height:1;transition:opacity .12s}
    #result.flash{opacity:0}
    .range-bar{width:100%;height:6px;background:#2a2a2a;border-radius:3px;margin-top:12px;position:relative;overflow:hidden}
    .range-fill{position:absolute;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:3px;transition:left .3s,width .3s}
    .range-hint{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:4px}
    .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    .btn{border:none;border-radius:8px;padding:16px;font-family:'DM Mono',monospace;font-size:15px;cursor:pointer;transition:opacity .15s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn:active{transform:scale(.97)}.btn:disabled{opacity:.4;cursor:default}
    .btn-higher{background:#1a2e20;color:var(--success);border:1px solid #2a4030}
    .btn-lower{background:#2e1a1a;color:var(--danger);border:1px solid #402a2a}
    .btn-euro-ok{width:100%;background:#0e1e2e;color:var(--info);border:1px solid #1a3a50;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;padding:14px;border-radius:8px;cursor:pointer;transition:opacity .2s;margin-bottom:10px}
    .btn-euro-ok:disabled{opacity:.4;cursor:default}
    .btn-found{width:100%;background:linear-gradient(135deg,var(--gold),#a07830);color:var(--dark);font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;padding:16px;border-radius:8px;border:none;cursor:pointer;transition:opacity .2s,transform .1s}
    .btn-found:active{transform:scale(.98)}.btn-found:disabled{opacity:.4;cursor:default}
    .keyboard-hint{text-align:center;font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:14px}
    kbd{background:#2a2a2a;border:1px solid #3a3a3a;border-radius:4px;padding:1px 5px;font-family:'DM Mono',monospace;font-size:9px}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:10;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn .3s ease;padding:24px;text-align:center}
    .overlay.active{display:flex}
    .overlay-icon{font-size:64px;margin-bottom:16px}
    .overlay-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:var(--gold-light);margin-bottom:8px}
    .overlay-price{font-family:'Bebas Neue',sans-serif;font-size:72px;color:var(--gold);line-height:1;margin-bottom:8px}
    .overlay-stats{color:var(--muted);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px}
    .btn-replay{background:var(--surface);border:1px solid var(--gold);color:var(--gold);font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;padding:14px 32px;border-radius:8px;cursor:pointer;transition:background .2s}
    .btn-replay:hover{background:#1e1a10}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">🍾 ChampomyFM</div>
    <div class="tagline">Le juste prix à une 🫧 près</div>
  </header>
  <div id="setup">
    <div class="setup-label">Définir l'intervalle</div>
    <div class="input-row">
      <div class="input-wrap">
        <label for="min">Minimum</label>
        <span class="currency-symbol">€</span>
        <input type="number" step="1" min="0" id="min" placeholder="0">
      </div>
      <div class="input-wrap">
        <label for="max">Maximum</label>
        <span class="currency-symbol">€</span>
        <input type="number" step="1" min="0" id="max" placeholder="500">
      </div>
    </div>
    <button class="btn-start" onclick="startGame()">Commencer la partie</button>
  </div>
  <div id="game">
    <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar"></div></div>
    <div class="hud">
      <span>Essais : <strong id="counter">0</strong></span>
      <span class="hud-timer">⏱ <strong id="timerText">25</strong>s</span>
      <span id="phaseHud">Phase : euros</span>
    </div>
    <div class="price-card">
      <div class="phase-label" id="phaseLabel">Phase euros</div>
      <div id="result">—</div>
      <div class="range-bar"><div class="range-fill" id="rangeFill"></div></div>
      <div class="range-hint"><span id="rangeMin">—</span><span id="rangeMax">—</span></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-higher" id="btnHigher" onclick="higher()">⬆ Plus</button>
      <button class="btn btn-lower"  id="btnLower"  onclick="lower()">⬇ Moins</button>
    </div>
    <button class="btn-euro-ok" id="btnEuroOk" onclick="euroOk()">✔ Bon euro, affiner les centimes</button>
    <button class="btn-found"   id="btnFound"  onclick="found()">✅ Prix exact trouvé !</button>
    <div class="keyboard-hint"><kbd>↑</kbd> Plus &nbsp;·&nbsp; <kbd>↓</kbd> Moins &nbsp;·&nbsp; <kbd>Space</kbd> Bon euro &nbsp;·&nbsp; <kbd>Enter</kbd> Trouvé</div>
  </div>
</div>
<div class="overlay" id="overlay">
  <div class="overlay-icon" id="overlayIcon">🎉</div>
  <div class="overlay-title" id="overlayTitle">Prix trouvé !</div>
  <div class="overlay-price" id="overlayPrice"></div>
  <div class="overlay-stats" id="overlayStats"></div>
  <button class="btn-replay" onclick="resetGame()">↺ Rejouer</button>
</div>

<script>
  /*
   * PHASE EUROS  : dichotomie sur euros entiers (minE..maxE).
   *   ⬆ Plus  → l'euro est > midE  → minE = midE + 1
   *   ⬇ Moins → l'euro est < midE  → maxE = midE - 1
   *   ✔ Bon euro → l'euro est midE, on passe aux centimes
   *   (transition auto si minE===maxE après Plus/Moins)
   *
   * PHASE CENTIMES : dichotomie sur centimes 0..99 dans foundEuro.
   *   ⬆ Plus  → centimes > midC → minC = midC + 1
   *   ⬇ Moins → centimes < midC → maxC = midC - 1
   *   ✅ Trouvé → valide le prix affiché
   */

  let phase = 'euros';
  let minE, maxE, midE;
  let foundEuro, minC, maxC, midC;
  let displayedCents;
  let attempts = 0, timeLeft = 25;
  let timerInterval, gameOver = false;
  let totalMinC, totalMaxC;

  const fmt = c => (c / 100).toFixed(2) + ' €';

  function setDisabled(d) {
    ['btnHigher','btnLower','btnEuroOk','btnFound'].forEach(id => document.getElementById(id).disabled = d);
  }

  function updateButtons() {
    // En phase euros : "Bon euro" visible, "Trouvé" caché
    // En phase centimes : "Bon euro" caché, "Trouvé" visible
    document.getElementById('btnEuroOk').style.display = phase === 'euros' ? 'block' : 'none';
    document.getElementById('btnFound').style.display  = phase === 'centimes' ? 'block' : 'none';
  }

  function flash(label) {
    const el = document.getElementById('result');
    el.classList.add('flash');
    setTimeout(() => { el.textContent = label; el.classList.remove('flash'); }, 120);
    attempts++;
    document.getElementById('counter').textContent = attempts;
  }

  function updateRangeBar(lo, hi) {
    const total = totalMaxC - totalMinC;
    if (!total) return;
    const fill = document.getElementById('rangeFill');
    fill.style.left  = Math.max((lo - totalMinC) / total * 100, 0) + '%';
    fill.style.width = Math.max((hi - lo) / total * 100, 0.5) + '%';
    document.getElementById('rangeMin').textContent = fmt(lo);
    document.getElementById('rangeMax').textContent = fmt(hi);
  }

  // ── Phase euros ──────────────────────────────────────
  function guessEuros() {
    if (minE === maxE) { enterCentimes(minE); return; }
    midE = Math.floor((minE + maxE) / 2);
    displayedCents = midE * 100;
    flash(fmt(displayedCents));
    updateRangeBar(minE * 100, maxE * 100 + 99);
    document.getElementById('phaseLabel').textContent = 'Phase euros';
    document.getElementById('phaseHud').textContent   = 'Phase : euros';
    updateButtons();
  }

  function euroOk() {
    if (gameOver || phase !== 'euros') return;
    enterCentimes(midE);
  }

  function enterCentimes(euro) {
    foundEuro = euro;
    minC = 0; maxC = 99;
    phase = 'centimes';
    document.getElementById('phaseLabel').textContent = 'Phase centimes';
    document.getElementById('phaseHud').textContent   = 'Phase : centimes';
    updateButtons();
    guessCentimes();
  }

  // ── Phase centimes ───────────────────────────────────
  function guessCentimes() {
    midC = Math.floor((minC + maxC) / 2);
    displayedCents = foundEuro * 100 + midC;
    flash(fmt(displayedCents));
    updateRangeBar(foundEuro * 100 + minC, foundEuro * 100 + maxC);
  }

  // ── Actions communes ─────────────────────────────────
  function higher() {
    if (gameOver) return;
    if (phase === 'euros') {
      minE = midE + 1;
      if (minE > maxE) { endGame(false); return; }
      guessEuros();
    } else {
      minC = midC + 1;
      if (minC > maxC) { endGame(false); return; }
      guessCentimes();
    }
  }

  function lower() {
    if (gameOver) return;
    if (phase === 'euros') {
      maxE = midE - 1;
      if (minE > maxE) { endGame(false); return; }
      guessEuros();
    } else {
      maxC = midC - 1;
      if (minC > maxC) { endGame(false); return; }
      guessCentimes();
    }
  }

  function found() {
    if (gameOver || phase !== 'centimes') return;
    clearInterval(timerInterval);
    endGame(true);
  }

  // ── Start / End / Reset ──────────────────────────────
  function startGame() {
    const minVal = parseInt(document.getElementById('min').value);
    const maxVal = parseInt(document.getElementById('max').value);
    if (isNaN(minVal) || isNaN(maxVal) || minVal >= maxVal || minVal < 0) {
      ['min','max'].forEach(id => {
        const el = document.getElementById(id);
        el.style.borderColor = 'var(--danger)';
        setTimeout(() => el.style.borderColor = '', 800);
      });
      return;
    }
    minE = minVal; maxE = maxVal;
    totalMinC = minE * 100; totalMaxC = maxE * 100 + 99;
    attempts = 0; timeLeft = 25; gameOver = false; phase = 'euros';

    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display  = 'block';
    document.getElementById('overlay').classList.remove('active');
    setDisabled(false);
    startTimer();
    guessEuros();
  }

  function startTimer() {
    updateTimerUI();
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerUI();
      if (timeLeft <= 0) { clearInterval(timerInterval); endGame(false); }
    }, 1000);
  }

  function updateTimerUI() {
    document.getElementById('timerText').textContent = timeLeft;
    const bar = document.getElementById('timerBar');
    bar.style.width = (timeLeft / 25 * 100) + '%';
    bar.classList.toggle('urgent', timeLeft <= 8);
  }

  function endGame(success) {
    gameOver = true; clearInterval(timerInterval); setDisabled(true);
    document.getElementById('overlayIcon').textContent  = success ? '🎉' : '⛔';
    document.getElementById('overlayTitle').textContent = success ? 'Prix trouvé !' : 'Temps écoulé !';
    document.getElementById('overlayPrice').textContent = fmt(displayedCents);
    document.getElementById('overlayStats').textContent = success
      ? `En ${attempts} essai${attempts > 1 ? 's' : ''} — ${25 - timeLeft}s`
      : `Dernier essai : ${fmt(displayedCents)}`;
    document.getElementById('overlay').classList.add('active');
  }

  function resetGame() {
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('game').style.display  = 'none';
    document.getElementById('setup').style.display = 'block';
    document.getElementById('result').textContent  = '—';
    document.getElementById('counter').textContent = '0';
    document.getElementById('timerText').textContent = '25';
    const bar = document.getElementById('timerBar');
    bar.style.width = '100%'; bar.classList.remove('urgent');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp')   higher();
    if (e.key === 'ArrowDown') lower();
    if (e.key === ' ')         euroOk();
    if (e.key === 'Enter')     found();
  });

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
