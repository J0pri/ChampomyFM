<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>ChampomyFM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --dark: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --text: #f0ece0;
      --muted: #7a7060;
      --success: #5ec47a;
      --danger: #e05a5a;
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Background grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .tagline {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── SETUP ── */
    #setup {
      background: var(--surface);
      border: 1px solid #2a2a2a;
      border-radius: var(--radius);
      padding: 32px;
      animation: fadeIn 0.4s ease;
    }

    .setup-label {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .input-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    .input-wrap label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .input-wrap input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      padding: 12px 14px 12px 28px;
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .input-wrap input:focus {
      border-color: var(--gold);
    }

    .currency-symbol {
      position: absolute;
      left: 10px;
      bottom: 13px;
      color: var(--gold);
      font-size: 14px;
    }

    .btn-start {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), #a07830);
      border: none;
      border-radius: 8px;
      padding: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      color: var(--dark);
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-start:hover { opacity: 0.9; }
    .btn-start:active { transform: scale(0.98); }

    /* ── GAME ── */
    #game {
      display: none;
      animation: fadeIn 0.4s ease;
    }

    /* Timer bar */
    .timer-bar-wrap {
      height: 4px;
      background: #2a2a2a;
      border-radius: 2px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .timer-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 2px;
      width: 100%;
      transition: width 1s linear, background 0.5s;
    }

    .timer-bar.urgent {
      background: linear-gradient(90deg, var(--danger), #ff9090);
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 12px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .hud-timer { color: var(--text); font-size: 14px; }

    /* Price display */
    .price-card {
      background: var(--surface);
      border: 1px solid #252525;
      border-radius: var(--radius);
      padding: 28px 24px;
      text-align: center;
      margin-bottom: 16px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .phase-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    #result {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      letter-spacing: 2px;
      color: var(--gold-light);
      line-height: 1;
      transition: opacity 0.15s;
    }

    #result.flash {
      opacity: 0;
    }

    /* Range indicator */
    .range-bar {
      width: 100%;
      height: 6px;
      background: #2a2a2a;
      border-radius: 3px;
      margin-top: 12px;
      position: relative;
      overflow: hidden;
    }

    .range-fill {
      position: absolute;
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 3px;
      transition: left 0.3s, width 0.3s;
    }

    .range-hint {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Buttons */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 16px;
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .btn-higher { background: #1a2e20; color: var(--success); border: 1px solid #2a4030; }
    .btn-lower  { background: #2e1a1a; color: var(--danger);  border: 1px solid #402a2a; }

    .btn-found {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), #a07830);
      color: var(--dark);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      padding: 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-found:active { transform: scale(0.98); }
    .btn-found:disabled { opacity: 0.4; cursor: default; }

    .keyboard-hint {
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      margin-top: 14px;
    }

    kbd {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      padding: 1px 5px;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
    }

    /* Result overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 10;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
      padding: 24px;
      text-align: center;
    }

    .overlay.active { display: flex; }

    .overlay-icon { font-size: 64px; margin-bottom: 16px; }

    .overlay-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 3px;
      color: var(--gold-light);
      margin-bottom: 8px;
    }

    .overlay-price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 72px;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 8px;
    }

    .overlay-stats {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .btn-replay {
      background: var(--surface);
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      padding: 14px 32px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-replay:hover { background: #1e1a10; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">🍾 ChampomyFM</div>
    <div class="tagline">Le juste prix à une 🫧 près</div>
  </header>

  <!-- SETUP -->
  <div id="setup">
    <div class="setup-label">Définir l'intervalle</div>
    <div class="input-row">
      <div class="input-wrap">
        <label for="min">Minimum</label>
        <span class="currency-symbol">€</span>
        <input type="number" step="0.01" min="0" id="min" placeholder="0.00">
      </div>
      <div class="input-wrap">
        <label for="max">Maximum</label>
        <span class="currency-symbol">€</span>
        <input type="number" step="0.01" min="0" id="max" placeholder="100.00">
      </div>
    </div>
    <button class="btn-start" onclick="startGame()">Commencer la partie</button>
  </div>

  <!-- GAME -->
  <div id="game">
    <div class="timer-bar-wrap">
      <div class="timer-bar" id="timerBar"></div>
    </div>

    <div class="hud">
      <span>Essais : <strong id="counter">0</strong></span>
      <span class="hud-timer">⏱ <strong id="timerText">25</strong>s</span>
      <span id="phaseHud">Phase : euros</span>
    </div>

    <div class="price-card">
      <div class="phase-label" id="phaseLabel">Phase euros</div>
      <div id="result">—</div>
      <div class="range-bar">
        <div class="range-fill" id="rangeFill"></div>
      </div>
      <div class="range-hint">
        <span id="rangeMin">—</span>
        <span id="rangeMax">—</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-higher" id="btnHigher" onclick="higher()">⬆ Plus</button>
      <button class="btn btn-lower"  id="btnLower"  onclick="lower()">⬇ Moins</button>
    </div>
    <button class="btn-found" id="btnFound" onclick="found()">✅ Trouvé !</button>

    <div class="keyboard-hint">
      <kbd>↑</kbd> Plus &nbsp;·&nbsp; <kbd>↓</kbd> Moins &nbsp;·&nbsp; <kbd>Enter</kbd> Trouvé
    </div>
  </div>
</div>

<!-- RESULT OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-icon" id="overlayIcon">🎉</div>
  <div class="overlay-title" id="overlayTitle">Prix trouvé !</div>
  <div class="overlay-price" id="overlayPrice"></div>
  <div class="overlay-stats" id="overlayStats"></div>
  <button class="btn-replay" onclick="resetGame()">↺ Rejouer</button>
</div>

<script>
  // ── State ──────────────────────────────────────────────
  let minCents, maxCents, totalMin, totalMax;
  let current;
  let phase = 'euros'; // 'euros' | 'centimes'
  let attempts = 0;
  let timeLeft = 25;
  let timerInterval;
  let gameOver = false;

  // ── Helpers ────────────────────────────────────────────
  const toCents = v => Math.round(v * 100);
  const toEuros = v => (v / 100).toFixed(2);

  function setDisabled(disabled) {
    ['btnHigher', 'btnLower', 'btnFound'].forEach(id => {
      document.getElementById(id).disabled = disabled;
    });
  }

  function flashResult() {
    const el = document.getElementById('result');
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 150);
  }

  function updateRangeBar() {
    const fill = document.getElementById('rangeFill');
    const range = totalMax - totalMin;
    if (range === 0) { fill.style.left = '0%'; fill.style.width = '100%'; return; }
    const leftPct  = ((minCents - totalMin) / range) * 100;
    const widthPct = ((maxCents - minCents) / range) * 100;
    fill.style.left  = leftPct  + '%';
    fill.style.width = Math.max(widthPct, 1) + '%';
    document.getElementById('rangeMin').textContent = toEuros(minCents) + ' €';
    document.getElementById('rangeMax').textContent = toEuros(maxCents) + ' €';
  }

  // ── Game start ─────────────────────────────────────────
  function startGame() {
    const minVal = parseFloat(document.getElementById('min').value);
    const maxVal = parseFloat(document.getElementById('max').value);

    if (isNaN(minVal) || isNaN(maxVal) || minVal >= maxVal || minVal < 0) {
      document.getElementById('min').style.borderColor = 'var(--danger)';
      document.getElementById('max').style.borderColor = 'var(--danger)';
      setTimeout(() => {
        document.getElementById('min').style.borderColor = '';
        document.getElementById('max').style.borderColor = '';
      }, 800);
      return;
    }

    minCents  = toCents(minVal);
    maxCents  = toCents(maxVal);
    totalMin  = minCents;
    totalMax  = maxCents;
    attempts  = 0;
    timeLeft  = 25;
    phase     = 'euros';
    gameOver  = false;

    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display  = 'block';
    document.getElementById('overlay').classList.remove('active');
    setDisabled(false);

    startTimer();
    guess();
  }

  // ── Timer ──────────────────────────────────────────────
  function startTimer() {
    updateTimerUI();
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerUI();
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        endGame(false);
      }
    }, 1000);
  }

  function updateTimerUI() {
    document.getElementById('timerText').textContent = timeLeft;
    const bar = document.getElementById('timerBar');
    bar.style.width = (timeLeft / 25 * 100) + '%';
    if (timeLeft <= 8) bar.classList.add('urgent');
    else               bar.classList.remove('urgent');
  }

  // ── Phase ──────────────────────────────────────────────
  function checkPhaseTransition() {
    if (phase === 'euros' && (maxCents - minCents) < 100) {
      // On connaît l'euro exact ; on affine les centimes
      const euroFloor = Math.floor(minCents / 100);
      minCents = euroFloor * 100;
      maxCents = euroFloor * 100 + 99;
      phase = 'centimes';
      document.getElementById('phaseLabel').textContent = 'Phase centimes';
      document.getElementById('phaseHud').textContent   = 'Phase : centimes';
    }
  }

  // ── Guess ──────────────────────────────────────────────
  function guess() {
    checkPhaseTransition();

    if (phase === 'euros') {
      // Dichotomie sur les euros entiers
      const minE = Math.floor(minCents / 100);
      const maxE = Math.floor(maxCents / 100);
      const midE = Math.floor((minE + maxE) / 2);
      current = midE * 100;
    } else {
      // Dichotomie sur les centimes
      current = Math.floor((minCents + maxCents) / 2);
    }

    flashResult();
    setTimeout(() => {
      document.getElementById('result').textContent = toEuros(current) + ' €';
    }, 75);

    attempts++;
    document.getElementById('counter').textContent = attempts;
    updateRangeBar();
  }

  // ── Actions ────────────────────────────────────────────
  function higher() {
    if (gameOver) return;
    if (phase === 'euros') {
      // Le prix est strictement au-dessus de l'euro affiché
      const euros = Math.floor(current / 100);
      minCents = (euros + 1) * 100;
      // S'assurer que maxCents couvre bien tous les centimes de son euro
      maxCents = Math.floor(maxCents / 100) * 100 + 99;
    } else {
      minCents = current + 1;
    }
    if (minCents > maxCents) { endGame(false); return; }
    guess();
  }

  function lower() {
    if (gameOver) return;
    if (phase === 'euros') {
      // Le prix est strictement en dessous de l'euro affiché
      const euros = Math.floor(current / 100);
      maxCents = euros * 100 - 1;
      // S'assurer que minCents part bien du début de son euro
      minCents = Math.floor(minCents / 100) * 100;
    } else {
      maxCents = current - 1;
    }
    if (minCents > maxCents) { endGame(false); return; }
    guess();
  }

  function found() {
    if (gameOver) return;
    clearInterval(timerInterval);
    endGame(true);
  }

  // ── End ────────────────────────────────────────────────
  function endGame(success) {
    gameOver = true;
    clearInterval(timerInterval);
    setDisabled(true);

    const overlay = document.getElementById('overlay');
    document.getElementById('overlayIcon').textContent  = success ? '🎉' : '⛔';
    document.getElementById('overlayTitle').textContent = success ? 'Prix trouvé !' : 'Temps écoulé !';
    document.getElementById('overlayPrice').textContent = toEuros(current) + ' €';
    document.getElementById('overlayStats').textContent =
      success
        ? `En ${attempts} essai${attempts > 1 ? 's' : ''} — ${25 - timeLeft}s`
        : `Dernier essai : ${toEuros(current)} €`;
    overlay.classList.add('active');
  }

  function resetGame() {
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('game').style.display  = 'none';
    document.getElementById('setup').style.display = 'block';
    document.getElementById('phaseLabel').textContent = 'Phase euros';
    document.getElementById('phaseHud').textContent   = 'Phase : euros';
    document.getElementById('result').textContent = '—';
    document.getElementById('counter').textContent = '0';
    document.getElementById('timerText').textContent = '25';
    document.getElementById('timerBar').style.width = '100%';
    document.getElementById('timerBar').classList.remove('urgent');
  }

  // ── Keyboard ───────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp')   higher();
    if (e.key === 'ArrowDown') lower();
    if (e.key === 'Enter')     found();
  });

  // ── PWA ───────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
